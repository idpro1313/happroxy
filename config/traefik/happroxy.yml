# Traefik dynamic config for happroxy / 3X-UI (file provider, optional)
#
# Replace PANEL_DOMAIN.example with your FQDN before use, or run:
#   bash scripts/setup-https.sh --file-provider --domain <PANEL_DOMAIN>
#
# Prerequisites:
#   1. DNS A-record: <PANEL_DOMAIN> → <SERVER_IP>
#   2. certResolver "le" (or yours) in Traefik static config
#   3. Upstream: host gateway IP (default 172.17.0.1) and PANEL_PORT / SUB_PORT

http:
  routers:
    happroxy-sub:
      rule: "Host(`PANEL_DOMAIN.example`) && PathPrefix(`/sub/`)"
      entryPoints:
        - websecure
      service: happroxy-sub
      tls:
        certResolver: le
      priority: 20

    happroxy-panel:
      rule: "Host(`PANEL_DOMAIN.example`)"
      entryPoints:
        - websecure
      service: happroxy-panel
      tls:
        certResolver: le
      priority: 10

    happroxy-http-redirect:
      rule: "Host(`PANEL_DOMAIN.example`)"
      entryPoints:
        - web
      middlewares:
        - happroxy-redirect-https
      service: happroxy-panel
      priority: 10

  middlewares:
    happroxy-redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    happroxy-panel:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:38471"

    happroxy-sub:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:2096"
